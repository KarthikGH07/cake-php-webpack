services:
  # PHP application with php-fpm 8.3
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/app
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - cake-network
    depends_on:
      - db

  # Nginx web server
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - .:/var/www/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cake-network
    depends_on:
      - php

  # MySQL database
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cake_app
      MYSQL_USER: cake
      MYSQL_PASSWORD: cake
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - cake-network

  # Node.js for building frontend assets
  node:
    image: node:18-alpine
    working_dir: /var/www/app
    volumes:
      - .:/var/www/app
    command: >
      sh -c "npm install && npm run watch"
    networks:
      - cake-network

networks:
  cake-network:
    driver: bridge

volumes:
  db-data:
